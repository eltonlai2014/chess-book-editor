<!doctype html>
<html lang="zh-Hant" data-board="traditional">

<head>
  <meta charset="utf-8">
  <title>梅友弈鑑 — 象棋譜分析</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/assets/editor.css?v=39">
</head>

<body>
  <header>
    <h1>
      <!-- 朱文篆刻方印 brand seal (matches favicon.svg); cinnabar, fixed by
           intent — a seal reads red regardless of the active UI theme. -->
      <svg class="appLogo appSeal" viewBox="0 0 32 32" aria-hidden="true">
        <rect x="2.5" y="2.5" width="27" height="27" rx="4" ry="4"
          fill="none" stroke="#c0392b" stroke-width="2.3" />
        <text x="16" y="17.2" text-anchor="middle" dominant-baseline="central"
          font-family="'LXGW WenKai TC','DFKai-SB','KaiTi','Microsoft JhengHei',serif"
          font-weight="700" font-size="20" fill="#c0392b">梅</text>
      </svg>梅友弈鑑
    </h1>
    <div class="actions">
      <label class="boardThemePicker">
        棋盤
        <select id="boardThemeSel">
          <option value="traditional">傳統手繪</option>
          <option value="stone">雅石回紋</option>
          <option value="gilded">鎏金歲月</option>
        </select>
      </label>
      <span class="actionsDivider" aria-hidden="true"></span>
      <button id="saveBtn" disabled>儲存</button>
      <span id="status"></span>
    </div>
  </header>
  <main>
    <aside id="filePane">
      <h2 class="panelHead">
        <span>檔案</span>
        <button id="settingsBtn" class="iconBtn" title="設定（根目錄／評估庫／引擎）"></button>
        <button id="rescanBtn" class="iconBtn" title="重新掃描目錄（偵測新增／刪除的棋譜）" disabled>重掃</button>
        <button id="newXqfBtn" class="iconBtn" title="新增棋譜" disabled>➕ 新增</button>
      </h2>
      <div id="fileTree">載入中…</div>
    </aside>
    <div class="splitter splitter-v" data-resize="filePane" data-pref="splitFileW"></div>
    <section id="boardPane">
      <div id="fileTitleBar">
        <h2 id="fileTitle">尚未載入</h2>
        <button id="metaBtn" class="iconBtn" disabled title="編輯賽事資訊"></button>
      </div>
      <svg id="board" viewBox="0 0 540 600"></svg>
      <div id="navBar">
        <button id="navFirst" title="回開局 (Home)">|◀</button>
        <button id="navPrev" title="上一步 (←)">◀</button>
        <button id="navBranch" title="回到上一個分支點 (B)">⎇ 分支</button>
        <button id="navNext" title="下一步 (→)">▶</button>
        <button id="navLast" title="最末步 (End)">▶|</button>
        <span id="moveInfo"></span>
        <button id="perspectiveBtn" title="切換紅黑方棋盤視角">紅方</button>
      </div>
      <div id="evalLine" title="評估的是「走這步之前」的決策點（前一步）：深N＝該局面引擎分、建議＝該局面最佳著、雲＝雲庫最佳著。用來評斷目前這步走得好不好。"></div>
    </section>
    <div class="splitter splitter-v" data-resize="boardPane" data-pref="splitBoardW"></div>
    <aside id="rightPane">
      <div id="rpMoves" class="rpSection rpMoves">
        <h2 class="panelHead">
          <span>棋譜</span>
          <button id="exportGifBtn" class="iconBtn" title="把目前主線匯出成動畫 GIF"></button>
          <button id="navDelete" class="danger iconBtn" title="刪除目前走法及其後續 (Delete)"></button>
        </h2>
        <div id="moveList"></div>
      </div>
      <div class="splitter splitter-v" data-resize="rpMoves" data-pref="splitMovesW"></div>
      <div class="rpRightCol">
        <div id="rpAnnote" class="rpSection rpAnnote">
          <div class="rpTabs" role="tablist">
            <button id="anTabAnnote" class="rpTab active" data-tab="annote" role="tab">注解</button>
            <button id="anTabAi" class="rpTab" data-tab="ai" role="tab">AI分析</button>
            <div id="aiBar" class="aiBar" hidden>
              <button id="aiAnalyzeBtn" class="iconBtn" title="用皮卡魚在設定層數下，逐步分析目前分支每個局面並畫出走勢圖">分析本分支</button>
              <label class="aiDualToggle" title="同時用第二（較深）層數分析，標出深淺分歧的步（層數與門檻在 ⚙ 設定）">
                <input type="checkbox" id="aiDualChk"> 雙深度
              </label>
              <span id="aiState" class="engineState">尚未分析</span>
            </div>
          </div>
          <div id="anBodyAnnote" class="rpTabBody" data-tab="annote">
            <div id="annotePresetBar" class="annotePresetBar"></div>
            <textarea id="annoteBox" placeholder="（無註解，可在此輸入）"></textarea>
          </div>
          <div id="anBodyAi" class="rpTabBody" data-tab="ai" hidden>
            <div class="aiChartWrap">
              <svg id="aiChart" class="aiChart" preserveAspectRatio="none"></svg>
            </div>
            <div id="aiReadout" class="aiReadout"></div>
          </div>
        </div>
        <div class="splitter splitter-h" data-resize="rpAnnote" data-pref="splitAnnoteH" data-direction="row"></div>
        <div id="rpVars" class="rpSection rpVars">
          <div class="rpTabs" role="tablist">
            <button id="rpTabVars" class="rpTab active" data-tab="vars" role="tab">本步的所有走法</button>
            <button id="rpTabCdb" class="rpTab" data-tab="cdb" role="tab">雲庫</button>
            <button id="rpTabCdbLine" class="rpTab" data-tab="cdbline" role="tab">雲庫演繹</button>
            <button id="rpTabEngine" class="rpTab" data-tab="engine" role="tab">引擎分析</button>
            <button id="rpTabAuto" class="rpTab" data-tab="auto" role="tab">AI走棋</button>
          </div>
          <div id="rpVarsBody" class="rpTabBody" data-tab="vars">
            <div id="varPicker"></div>
          </div>
          <div id="rpCdbBody" class="rpTabBody" data-tab="cdb" hidden>
            <div class="engineBar">
              <div class="segToggle" role="group" aria-label="查詢局面">
                <button id="cdbScopePrev" class="iconBtn segBtn active" data-scope="prev" title="列出走「目前這一步」可選的著法（當前著＋同層分支）">當前步</button>
                <button id="cdbScopeNext" class="iconBtn segBtn" data-scope="next" title="列出走完本步「之後」局面可走的著法（點擊加入為當前著的後續）">下一步</button>
              </div>
              <button id="cdbRefreshBtn" class="iconBtn" title="重新向 chessdb.cn 查詢目前顯示的局面（略過快取）">重查</button>
              <span id="cdbState" class="engineState">—</span>
            </div>
            <div id="cdbList" class="cdbList"></div>
          </div>
          <div id="rpCdbLineBody" class="rpTabBody" data-tab="cdbline" hidden>
            <div class="engineBar">
              <button id="cdbLineRunBtn" class="iconBtn engineToggle" title="從本局面起，雙方都走雲庫最佳著，逐步推演一條主線（步數見 ⚙ 設定）">演繹</button>
              <button id="cdbLineDemoBtn" class="iconBtn" title="在彈出棋盤上演示這條雲庫主線" disabled>演示</button>
              <button id="cdbLineAddBtn" class="iconBtn" title="把這條雲庫主線加入棋譜分支" disabled>加入</button>
              <span id="cdbLineState" class="engineState">尚未演繹</span>
            </div>
            <div id="cdbLineList" class="engineHistory"></div>
          </div>
          <div id="rpEngineBody" class="rpTabBody" data-tab="engine" hidden>
            <div class="engineBar">
              <div class="segToggle" role="group" aria-label="分析局面">
                <button id="engineToggleBtn" class="iconBtn segBtn" title="分析前一步的局面（評斷本步走法好壞）；再按一次停止">前一步</button>
                <button id="engineCurBtn" class="iconBtn segBtn" title="分析本步的局面（走完本步之後）；再按一次停止">本步</button>
              </div>
              <button id="engineClearBtn" class="iconBtn" title="清除分析歷程">清除</button>
              <button id="engineExportBtn" class="iconBtn" title="複製分析歷程到剪貼簿">導出</button>
              <span id="engineState" class="engineState">尚未開始</span>
            </div>
            <div id="engineHistory" class="engineHistory"></div>
          </div>
          <div id="rpAutoBody" class="rpTabBody" data-tab="auto" hidden>
            <div class="engineBar">
              <button id="autoStartBtn" class="iconBtn engineToggle" title="開始/停止 AI 自動走棋（步時/紅黑由 ⚙ 設定）">開始</button>
              <button id="autoClearBtn" class="iconBtn" title="清除自動走棋歷程">清除</button>
              <span id="autoState" class="engineState">尚未開始</span>
            </div>
            <div id="autoHistory" class="engineHistory"></div>
          </div>
        </div>
      </div>
    </aside>
  </main>
  <!-- Hidden control board.js looks up for red/black perspective. -->
  <input type="checkbox" id="redPerspective" checked style="display:none">

  <div id="confirmModal" class="modal confirmModal" hidden>
    <div class="modalDialog confirmDialog" role="alertdialog" aria-modal="true" aria-labelledby="confirmTitle"
      aria-describedby="confirmMessage">
      <h3 id="confirmTitle">請確認</h3>
      <div id="confirmMessage" class="confirmMessage"></div>
      <div class="modalActions confirmActions">
        <button id="confirmCancel">取消</button>
        <button id="confirmOk" class="primary">確定</button>
      </div>
    </div>
  </div>

  <!-- Metadata edit dialog. Hidden by default; opened via #metaBtn. -->
  <div id="metaModal" class="modal" hidden>
    <div class="modalDialog" role="dialog" aria-modal="true" aria-labelledby="metaTitle">
      <h3 id="metaTitle">賽事資訊</h3>
      <div class="metaForm">
        <label>標題<input id="metaField-title" type="text" maxlength="60"></label>
        <label>賽事<input id="metaField-event" type="text" maxlength="60"></label>
        <label>日期<input id="metaField-date" type="text" maxlength="30" placeholder="YYYY.MM.DD"></label>
        <label>地點<input id="metaField-location" type="text" maxlength="30"></label>
        <label>紅方<input id="metaField-red_player" type="text" maxlength="14"></label>
        <label>黑方<input id="metaField-black_player" type="text" maxlength="14"></label>
        <label>講評<input id="metaField-commentator" type="text" maxlength="30"></label>
        <label>結果
          <select id="metaField-result">
            <option value="*">未知</option>
            <option value="1-0">紅勝</option>
            <option value="0-1">黑勝</option>
            <option value="1/2-1/2">和棋</option>
          </select>
        </label>
      </div>
      <div class="modalActions">
        <button id="metaCancel">取消</button>
        <button id="metaOk" class="primary">套用</button>
      </div>
    </div>
  </div>

  <!-- New-XQF dialog. Opened from the file pane's ➕ 新增 button. -->
  <div id="newModal" class="modal" hidden>
    <div class="modalDialog" role="dialog" aria-modal="true" aria-labelledby="newTitle">
      <h3 id="newTitle">新增棋譜</h3>
      <div class="metaForm">
        <label>標題<input id="newField-title" type="text" maxlength="60" placeholder="必填"></label>
        <label>子目錄<input id="newField-subdir" type="text" maxlength="200" placeholder="留空＝放在根目錄"></label>
        <label>檔名<input id="newField-filename" type="text" maxlength="80" placeholder="留空＝由標題自動產生"></label>
      </div>
      <div class="modalActions">
        <button id="newCancel">取消</button>
        <button id="newOk" class="primary">建立</button>
      </div>
    </div>
  </div>
  <!-- Engine-PV demo dialog: replays one analysis line on its own board,
       manually or auto (configurable interval). Read-only; closes without
       touching the move tree (use 加入 for that). -->
  <div id="demoModal" class="modal" hidden>
    <div class="modalDialog demoDialog" role="dialog" aria-modal="true" aria-labelledby="demoTitle">
      <h3 id="demoTitle"><span>變化例演示</span><button id="demoClose" class="modalClose" aria-label="關閉"
          title="關閉">✕</button></h3>
      <svg id="demoBoard" viewBox="0 0 540 600" width="414" height="460"></svg>
      <div id="demoMoveInfo" class="demoMoveInfo">起始局面</div>
      <div class="demoControls">
        <button id="demoFirst" class="iconBtn" title="回起點">⏮</button>
        <button id="demoPrev" class="iconBtn" title="上一步">◀</button>
        <button id="demoPlay" class="iconBtn" title="自動播放 / 暫停"></button>
        <button id="demoNext" class="iconBtn" title="下一步">▶</button>
        <button id="demoLast" class="iconBtn" title="到結尾">⏭</button>
        <label class="demoInterval">間隔
          <input id="demoInterval" type="number" min="0.2" max="10" step="0.1" value="2"> 秒
        </label>
      </div>
      <!-- 延伸 = 從「目前所在步」用引擎以固定層數重算一段 PV（捨棄此步之後的
           演示著法，因尾段可信度低；層數可量化勝過秒數）；加入 = 把整條（信得過
           的頭＋引擎算的尾）併進走子樹。兩者皆複用 openDemo state + addPvLine。 -->
      <div class="demoActions">
        <label class="demoInterval">計算
          <input id="demoExtendDepth" type="number" min="6" max="40" step="1" value="16"> 層
        </label>
        <button id="demoExtendBtn" class="iconBtn" title="從目前所在步用引擎重算延伸（會捨棄此步之後的演示著法）"></button>
        <button id="demoAddBtn" class="iconBtn" title="把整條變化例（含延伸）加入走子樹"></button>
      </div>
      <!-- 延伸／加入 的回饋（深度、捨尾、總步數、下一步可做什麼）顯示於此，窗內有
           整列寬度可換行 — 不再塞進 header 的 #status 把標題列擠壓。 -->
      <div id="demoStatus" class="demoStatus" hidden></div>
    </div>
  </div>
  <!-- Settings dialog. Holds the rarely-changed paths (library root / eval DB /
       Pikafish), moved out of the file pane to free vertical space. IDs + chip
       classes preserved so the existing render/picker JS works unchanged. -->
  <div id="settingsModal" class="modal" hidden>
    <div class="modalDialog" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <h3 id="settingsTitle"><span>設定</span><button id="settingsCloseX" class="modalClose" aria-label="關閉"
          title="關閉">✕</button></h3>
      <div class="settingsForm">
        <section class="settingsGroup">
          <h4 class="settingsGroupTitle">資料來源</h4>
          <div class="settingRow">
            <label>棋譜根目錄</label>
            <div class="rootPath">
              <span id="rootPathDisplay" title="棋譜來源根目錄">載入中…</span>
              <button id="rootPickBtn" title="選擇目錄…"></button>
            </div>
          </div>
          <div class="settingRow">
            <label>評估資料庫（唯讀）</label>
            <div class="evalDbRow evalDbRowSide">
              <span id="evalDbPath" title="引擎評估資料庫位置（唯讀）">載入中…</span>
              <button id="evalDbPickBtn" class="iconBtn" title="選擇 SQLite 評估資料庫…"></button>
            </div>
          </div>
          <div class="settingRow">
            <label>皮卡魚引擎（即時分析）</label>
            <div class="evalDbRow evalDbRowSide engineRowSide">
              <span id="enginePath" title="皮卡魚引擎執行檔位置（即時分析用）">載入中…</span>
              <button id="enginePickBtn" class="iconBtn" title="選擇皮卡魚引擎執行檔…"></button>
            </div>
          </div>
        </section>

        <section class="settingsGroup">
          <h4 class="settingsGroupTitle">引擎分析</h4>
          <div class="settingGrid">
            <div class="settingRow">
              <label title="「分析本分支」逐步分析每個局面所用的皮卡魚搜尋深度。層數越高越慢越準">AI 分析層數</label>
              <input id="aiDepthInput" type="number" min="1" max="30" step="1" value="12"
                title="「分析本分支」逐步分析每個局面所用的皮卡魚搜尋深度">
            </div>
            <div class="settingRow">
              <label title="勾選「雙深度」時的第二（較深）搜尋深度，建議比上者深。一次深算同時取得兩個深度的分數">AI 第二層數</label>
              <input id="aiDepth2Input" type="number" min="1" max="30" step="1" value="20"
                title="勾選「雙深度」時的第二（較深）搜尋深度。一次深算同時取得兩個深度的分數">
            </div>
            <div class="settingRow">
              <label title="兩個深度的分數相差超過此值時，於走勢圖該步標出警示符號">分歧門檻（cp）</label>
              <input id="aiDiffThreshInput" type="number" min="0" max="2000" step="10" value="200"
                title="兩個深度的分數相差超過此值時，於走勢圖該步標出警示符號">
            </div>
            <div class="settingRow">
              <label title="某步的著法損失（走子前後分數差）達到此值時，於走勢圖標為漏著（亮黃 ✖ 記號），讀數列同一行右側顯示引擎最佳著與其紅方分">漏著門檻（cp）</label>
              <input id="aiBlunderThreshInput" type="number" min="0" max="2000" step="10" value="200"
                title="某步的著法損失達到此值時標為漏著">
            </div>
          </div>
        </section>

        <section class="settingsGroup">
          <h4 class="settingsGroupTitle">雲庫演繹</h4>
          <div class="settingGrid">
            <div class="settingRow">
              <label title="「☁ 雲庫演繹」最多往前推幾步；雲庫無資料時會提前停止">演繹步數</label>
              <input id="cdbLineDepthInput" type="number" min="1" max="30" step="1" value="12"
                title="「☁ 雲庫演繹」最多往前推幾步；雲庫無資料時會提前停止">
            </div>
            <div class="settingRow">
              <label title="演繹時每次「即時查 chessdb.cn」之間的等待毫秒數（快取命中不等）。越小越快但越可能被 chessdb 限流；保守值 250">查詢間隔（ms）</label>
              <input id="cdbLineThrottleInput" type="number" min="100" max="2000" step="50" value="250"
                title="演繹時每次「即時查 chessdb.cn」之間的等待毫秒數（快取命中不等）。越小越快但越可能被 chessdb 限流；保守值 250">
            </div>
          </div>
        </section>

        <section class="settingsGroup">
          <h4 class="settingsGroupTitle">AI 自動走棋</h4>
          <div class="settingGrid">
            <div class="settingRow">
              <label title="勾選後，紅方由皮卡魚自動走子">AI 紅方</label>
              <input id="autoAiRedChk" type="checkbox"
                title="勾選後，紅方由皮卡魚自動走子">
            </div>
            <div class="settingRow">
              <label title="勾選後，黑方由皮卡魚自動走子">AI 黑方</label>
              <input id="autoAiBlackChk" type="checkbox"
                title="勾選後，黑方由皮卡魚自動走子">
            </div>
            <div class="settingRow">
              <label title="紅方每步的思考秒數；時間到立即依當前最高分走子">紅方步時（秒）</label>
              <input id="autoRedSecsInput" type="number" min="1" max="120" step="1" value="3"
                title="紅方每步的思考秒數；時間到立即依當前最高分走子">
            </div>
            <div class="settingRow">
              <label title="黑方每步的思考秒數；時間到立即依當前最高分走子">黑方步時（秒）</label>
              <input id="autoBlackSecsInput" type="number" min="1" max="120" step="1" value="3"
                title="黑方每步的思考秒數；時間到立即依當前最高分走子">
            </div>
            <div class="settingRow">
              <label title="沙盒演示模式自走的最大步數，避免無限自走">沙盒最大步數</label>
              <input id="autoMaxPliesInput" type="number" min="2" max="600" step="2" value="200"
                title="沙盒演示模式自走的最大步數，避免無限自走">
            </div>
          </div>
        </section>

        <section class="settingsGroup">
          <h4 class="settingsGroupTitle">匯出動畫</h4>
          <div class="settingGrid">
            <div class="settingRow">
              <label title="🎬 匯出 GIF 時每一手停留的秒數（最後一手會自動停久一點）">影格間隔（秒）</label>
              <input id="gifDelayInput" type="number" min="0.2" max="5" step="0.05" value="0.65"
                title="🎬 匯出 GIF 時每一手停留的秒數（最後一手會自動停久一點）">
            </div>
          </div>
        </section>
      </div>
      <div class="modalActions">
        <button id="settingsClose" class="primary">完成</button>
      </div>
    </div>
  </div>
  <script src="/assets/board.js?v=35"></script>
  <script src="/assets/editor.js?v=41"></script>
  <script src="/assets/gifenc.global.js"></script>
  <script src="/assets/gifexport.js?v=1"></script>
</body>

</html>
